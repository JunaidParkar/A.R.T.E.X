<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="root">
        <div id="navbar">
            <div id="back">
                <img src="../assets/back.png" alt="">
            </div>
            <h3>A.R.T.E.X</h3>
        </div>
        <div id="cmd">
            <div class="defaults">
                <p class="regularFont"># A.R.T.E.X - Advance Responsive Text Entity For Xpertise [version 3.0.0]</p>
                <p class="regularFont"># Type "help" for start...</p>
            </div>
            <div id="history">
                <p class="regularFont">$artex/home> <span>anda</span></p>
                <p class="regularFont error">'anda' is not recognized as an internal or external command, operable program or batch file.</p>
            </div>
            <div id="inputs">
                <p class="regularFont">$artex/home></p>
                <input class="regularFont" type="text" name="" id="inp">
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>

</html>
